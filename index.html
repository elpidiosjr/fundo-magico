<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet" />

	<title>Fundo Mágico</title>

	<link rel="stylesheet" href="./src/css/reset.css" />
	<link rel="stylesheet" href="./src/css/estilos.css" />
	<link rel="stylesheet" href="./src/css/responsivo.css" />
</head>

<body>
	<header class="header">
		<h1>Fundo Mágico</h1>
		<p class="subtitle">
			Transforme suas ideias em backgrounds incríveis com o poder da IA.
		</p>
	</header>

	<main class="container">
		<section class="card main-card">
			<h2 class="card-header">Descreva o background</h2>

			<form class="form-group">
				<textarea id="description" placeholder="Ex: gradiente azul"></textarea>

				<button id="generate-btn" class="btn-magic">
					Gerar Background
				</button>
			</form>
		</section>

		<section id="preview-section" class="preview-card"></section>

		<section id="code-output" class="code-grid">
			<div class="card code-card">
				<h3 class="code-title">HTML</h3>
				<pre id="html-code" class="code-block"></pre>
			</div>

			<div class="card code-card">
				<h3 class="code-title">CSS</h3>
				<pre id="css-code" class="code-block"></pre>
			</div>
		</section>
	</main>

	<script src="./src/js/script.js"></script>
</body>
</html>
